<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Min side</title>

  <!-- ✨ Kulere font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;

      opacity: 0;
      animation: fadeInImage 2s ease forwards;
    }

    /* GRADIENT OVER BILDE */
    .gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.75),
        rgba(0, 0, 0, 0)
      );
      z-index: 1;
    }

    /* TEKST */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;

      z-index: 2;
      text-align: center;
      color: white;

      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInText 2s ease forwards;
      animation-delay: 1s;

      padding-top: 30px;
    }

    h1 {
      margin: 0;
      font-size: 5rem; /* 🔥 dobbelt så stor */
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    i {
      display: block;
      margin-top: 15px;
      font-size: 2rem; /* 🔥 også større */
      font-weight: 300;
      opacity: 0.9;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <img src="Trophywife.jpg" alt="bakgrunnsbilde">

  <div class="gradient"></div>

  <div class="overlay">
    <h1>IN MY TROPHY WIFE ERA</h1>
    <i>I'm the wife that will help you get the trophy!</i>
  </div>

</body>
</html>
