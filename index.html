<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Min side</title>

  <!-- ✨ Kulere font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;

      opacity: 0;
      animation: fadeInImage 2s ease forwards;
    }

    /* GRADIENT OVER BILDE */
    .gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.75),
        rgba(0, 0, 0, 0)
      );
      z-index: 1;
    }

    /* TEKST */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;

      z-index: 2;
      text-align: center;
      color: white;

      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInText 2s ease forwards;
      animation-delay: 1s;

      padding-top: 30px;
    }

    h1 {
      margin: 0;
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 🔥 LINJE 2 (glow + highlight) */
    i {
      display: block;
      margin-top: 15px;
      font-size: 2rem;
      font-weight: 300;
      opacity: 0.95;

      position: relative;

      /* ✨ glow */
      text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.3);

      /* liten animasjon */
      transform: scale(0.95);
      animation: popIn 1s ease forwards;
      animation-delay: 1.4s;
    }

    /* 🌫 highlight bak teksten */
    i::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110%;
      height: 140%;
      background: radial-gradient(
        ellipse,
        rgba(255,255,255,0.2),
        rgba(255,255,255,0)
      );
      z-index: -1;
      border-radius: 12px;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      to {
        transform: scale(1);
      }
    }

    /* 📱 Mobiltilpasning */
    @media (max-width: 600px) {
      h1 {
        font-size: 2.8rem;
      }

      i {
        font-size: 1.4rem;
      }
    }

  </style>
</head>

<body>

  <img src="Trophywife.jpg" alt="bakgrunnsbilde">

  <div class="gradient"></div>

  <div class="overlay">
    <h1>IN MY TROPHY WIFE ERA</h1>
    <i>I'm the wife that will help you get the trophy!</i>
  </div>

</body>
</html>
