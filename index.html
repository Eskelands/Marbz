<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Min side</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
      background: black;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;

      opacity: 0;
      animation: fadeInImage 2s ease forwards;
    }

    .gradient {
      position: absolute;
      inset: 0;
      height: 40%;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.75),
        rgba(0, 0, 0, 0)
      );
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      text-align: center;
      color: white;

      padding-top: 40px;

      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInText 1.8s ease forwards 1s;
    }

    /* 🔥 HOVEDFIX: alltid 1 linje + stor og responsiv */
    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.1;

      white-space: nowrap;
    }

    .tagline {
      margin-top: 15px;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      font-weight: 300;
      opacity: 0.95;
      position: relative;

      transform: scale(0.95);
      animation: popIn 0.8s ease forwards 1.4s,
                 glowPulse 3s ease-in-out infinite 2s;

      padding: 0 15px;
    }

    .tagline::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 150%;
      background: radial-gradient(
        ellipse,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0)
      );
      z-index: -1;
      border-radius: 12px;

      animation: glowBg 4s ease-in-out infinite;
    }

    @keyframes fadeInImage {
      to { opacity: 1; }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      to { transform: scale(1); }
    }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(255,255,255,0.4),
          0 0 20px rgba(255,255,255,0.2);
      }
      50% {
        text-shadow:
          0 0 18px rgba(255,255,255,0.7),
          0 0 35px rgba(255,255,255,0.4);
      }
    }

    @keyframes glowBg {
      0%, 100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    @media (max-width: 600px) {
      .overlay {
        padding-top: 30px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <img src="Trophywife.jpg" alt="bakgrunnsbilde" class="bg-img">

    <div class="gradient"></div>

    <div class="overlay">
      <h1>IN MY TROPHY WIFE ERA</h1>
      <div class="tagline">
        I'm the wife that will help you get the trophy!
      </div>
    </div>
  </div>

</body>
</html>
