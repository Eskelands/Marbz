<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;

      opacity: 0;
      animation: fadeInImage 2s ease forwards;
    }

    /* TEKST OVER BILDE (HELT ØVERST) */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;

      z-index: 1;
      text-align: center;
      color: black;

      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInText 2s ease forwards;
      animation-delay: 1s;

      padding-top: 20px; /* litt luft fra toppen */
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    i {
      display: block;
      margin-top: 10px;
      font-size: 1.2rem;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <img src="Trophywife.jpg" alt="bakgrunnsbilde">

  <div class="overlay">
    <h1>IN MY TROPHY WIFE ERA</h1>
    <i>I'm the wife that will help you get the trophy!</i>
  </div>

</body>
</html>
