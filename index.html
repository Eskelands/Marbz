<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
      position: relative;
      font-family: Arial;
    }

    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      text-align: center;
      color: black;
    }

    h1 {
      margin: 0;
    }

    p, i {
      margin-top: 10px;
      display: block;
    }
  </style>
</head>

<body>

  <img src="Trophywife.jpg" alt="background">

  <div class="overlay">
    <h1>IN MY TROPHY WIFE ERA</h1>
    <i>I'm the wife that will help you get the trophy!</i>
  </div>

</body>
</html>
